<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        .status {
            color: #4ade80;
            font-size: 14px;
        }

        .chat-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            color: white;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot-bubble {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: rgba(255,255,255,0.15);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .chat-footer {
            padding: 20px;
            background: rgba(255,255,255,0.08);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .chat-form {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
        }

        .chat-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .send-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div>
            <h2>🤖 AI Chatbot</h2>
            <div class="status">● Online</div>
        </div>
    </div>

    <div class="chat-body">

        {% if request.method == 'POST' %}

        <div class="message user-message">
            <div class="bubble user-bubble">
                {{ request.POST.message }}
            </div>
        </div>

        <div class="message bot-message">
            <div class="bubble bot-bubble formatted-answer">
                {{ answer|linebreaksbr }}
            </div>
        </div>

        {% else %}

        <div class="message bot-message">
            <div class="bubble bot-bubble">
                Hello 👋<br><br>
                I am your AI Assistant.<br>
                Ask me anything.
            </div>
        </div>

        {% endif %}

    </div>

    <div class="chat-footer">

        <form method="POST" class="chat-form">

            {% csrf_token %}

            <input
                type="text"
                name="message"
                class="chat-input"
                placeholder="Type your message..."
                required
            >

            <button type="submit" class="send-btn">
                Send
            </button>

        </form>

    </div>

</div>

</body>
</html>
